name: Mobile OTA Update

on:
  push:
    branches:
      - master
    paths:
      - App.tsx
      - app.json
      - eas.json
      - package.json
      - package-lock.json
      - index.ts
      - src/**
      - assets/**
      - scripts/**
      - .github/workflows/manual.yml
  workflow_dispatch:
    inputs:
      channel:
        description: Canal EAS Update
        required: true
        default: production
        type: choice
        options:
          - preview
          - production
      message:
        description: Mensaje del update (opcional)
        required: false
        type: string

concurrency:
  group: mobile-ota-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eas-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EAS_NO_VCS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app version metadata
        run: npm run version:sync

      - name: Verify EAS token
        env:
          EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Falta configurar el secret EXPO_TOKEN en GitHub."
            exit 1
          fi

      - name: Verify EAS project link
        env:
          EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}
        run: npx eas-cli project:info --non-interactive

      - name: Publish OTA update (push -> production)
        if: github.event_name == 'push'
        env:
          EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}
        run: npx eas-cli update --non-interactive --channel production --message "OTA production ${GITHUB_SHA::7}"

      - name: Publish OTA update (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}
        run: |
          CHANNEL="${{ inputs.channel }}"
          MESSAGE="${{ inputs.message }}"
          if [ -z "$MESSAGE" ]; then
            MESSAGE="OTA ${CHANNEL} ${GITHUB_SHA::7}"
          fi
          npx eas-cli update --non-interactive --channel "$CHANNEL" --message "$MESSAGE"
